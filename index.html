<!DOCTYPE html>
<html lang="en" data-theme="gold">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronicles of Echoes - Platform</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        /* Base configuration for themes styling */
        :root {
            --bg-color: #121214;
            --panel-bg: #1a1a1e;
            --border-color: #c5a880;
            --text-main: #e2e8f0;
            --accent-color: #d4af37;
            --font-display: 'Cinzel', serif;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --border-color: #475569;
            --text-main: #f8fafc;
            --accent-color: #38bdf8;
            --font-display: 'Inter', sans-serif;
        }

        [data-theme="gold"] {
            --bg-color: #14110f;
            --panel-bg: #1c1814;
            --border-color: #c5a880;
            --text-main: #f4eae1;
            --accent-color: #d4af37;
            --font-display: 'Cinzel', serif;
        }

        [data-theme="neon"] {
            --bg-color: #0d0221;
            --panel-bg: #241442;
            --border-color: #ff007f;
            --text-main: #e0e0ff;
            --accent-color: #00ffff;
            --font-display: 'Inter', sans-serif;
        }

        [data-theme="green-hacker"] {
            --bg-color: #050505;
            --panel-bg: #0d0d0d;
            --border-color: #00ff00;
            --text-main: #33ff33;
            --accent-color: #00ff00;
            --font-display: 'Fira Code', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        
        .display-font { font-family: var(--font-display); }
        .theme-panel { background-color: var(--panel-bg); border-color: var(--border-color); }
        .theme-border { border-color: var(--border-color); }
        .theme-accent { color: var(--accent-color); }
        .theme-accent-bg { background-color: var(--accent-color); }

        /* Book layout specific shadows and blending */
        .book-page-bg {
            background: linear-gradient(to right, #fbf6ef 0%, #faeede 4%, #f5e6d3 8%, #f1dec5 50%, #f5e6d3 92%, #faeede 96%, #fbf6ef 100%);
            color: #2d241e;
        }
        [data-theme="dark"] .book-page-bg, 
        [data-theme="neon"] .book-page-bg, 
        [data-theme="green-hacker"] .book-page-bg {
            background: linear-gradient(to right, #181824 0%, #1e1e2f 50%, #181824 100%);
            color: #e2e8f0;
        }

        /* Translucent image implementation */
        .translucent-story-img {
            mix-blend-mode: multiply;
            opacity: 0.18;
            pointer-events: none;
        }
        [data-theme="dark"] .translucent-story-img,
        [data-theme="neon"] .translucent-story-img,
        [data-theme="green-hacker"] .translucent-story-img {
            mix-blend-mode: screen;
            opacity: 0.15;
        }

        /* Rotating animation for World Cup Trophy */
        @keyframes rotateTrophy {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }
        .rotating-trophy {
            animation: rotateTrophy 6s linear infinite;
            transform-style: preserve-3d;
        }
    </style>
</head>
<body class="p-4 min-h-screen">

    <!-- View Switcher Tabs (For demo purposes to view both layouts simultaneously) -->
    <div class="flex justify-center space-x-4 mb-6 border-b pb-4 theme-border">
        <button onclick="switchView('user-view')" id="tab-user-view" class="px-6 py-2 rounded-md font-bold bg-amber-600 text-white">User Web View</button>
        <button onclick="switchView('admin-view')" id="tab-admin-view" class="px-6 py-2 rounded-md font-bold bg-zinc-800 text-zinc-400 hover:bg-zinc-700">Admin Dashboard View</button>
    </div>

    <!-- ========================================== -->
    <!--          1. USER WEB VIEW SECTION          -->
    <!-- ========================================== -->
    <main id="user-view" class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <!-- Left Sidebar / Navigation Settings Column -->
        <div class="space-y-6">
            <!-- User Status Frame Card -->
            <div class="theme-panel border rounded-xl p-4 flex items-center justify-between relative shadow-lg">
                <div class="flex items-center space-x-3">
                    <div class="w-12 h-12 rounded-full border-2 theme-border overflow-hidden bg-zinc-800">
                        <img id="user-avatar" src="https://unsplash.com" alt="Avatar" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <p class="text-xs text-zinc-400">Logged in as</p>
                        <h4 id="user-display-name" class="font-bold theme-accent">AlexG</h4>
                    </div>
                </div>
                
                <!-- Dropdown Settings Button -->
                <div class="relative">
                    <button onclick="toggleDropdown('settings-dropdown')" class="w-8 h-8 rounded-md bg-zinc-800 flex items-center justify-center hover:bg-zinc-700 theme-accent">
                        <i class="fa-solid fa-cog"></i>
                    </button>
                    <!-- Settings & Theme Dropdown Menu -->
                    <div id="settings-dropdown" class="hidden absolute right-0 mt-2 w-56 rounded-lg shadow-xl theme-panel border p-3 z-50 text-sm">
                        <p class="font-bold mb-2 pb-1 border-b theme-border text-xs tracking-wider uppercase text-zinc-400">Select Theme</p>
                        <div class="space-y-1 mb-3">
                            <label class="flex items-center space-x-2 p-1.5 rounded hover:bg-zinc-800 cursor-pointer">
                                <input type="radio" name="theme-opt" onclick="changeTheme('dark')"> <span>Dark Theme</span>
                            </label>
                            <label class="flex items-center space-x-2 p-1.5 rounded hover:bg-zinc-800 cursor-pointer">
                                <input type="radio" name="theme-opt" checked onclick="changeTheme('gold')"> <span>Gold Theme</span>
                            </label>
                            <label class="flex items-center space-x-2 p-1.5 rounded hover:bg-zinc-800 cursor-pointer">
                                <input type="radio" name="theme-opt" onclick="changeTheme('neon')"> <span>Neon Theme</span>
                            </label>
                            <label class="flex items-center space-x-2 p-1.5 rounded hover:bg-zinc-800 cursor-pointer">
                                <input type="radio" name="theme-opt" onclick="changeTheme('green-hacker')"> <span>Green Hacker</span>
                            </label>
                        </div>
                        <div class="border-t theme-border pt-2 space-y-1">
                            <button onclick="openBugReportModal()" class="w-full text-left p-1.5 rounded hover:bg-zinc-800 text-emerald-400 flex items-center space-x-2">
                                <i class="fa-solid fa-bug"></i> <span>Report Bug</span>
                            </button>
                            <button onclick="triggerDeleteAccount()" class="w-full text-left p-1.5 rounded hover:bg-zinc-800 text-red-400 flex items-center space-x-2">
                                <i class="fa-solid fa-trash-can"></i> <span>Delete Account</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Rotating Trophy Display -->
            <div class="theme-panel border rounded-xl p-6 text-center flex flex-col items-center shadow-lg">
                <p class="text-xs uppercase text-zinc-400 tracking-widest mb-4">Milestone Progress</p>
                <div class="w-24 h-24 flex items-center justify-center bg-zinc-900/50 rounded-full border theme-border mb-2 p-2">
                    <img src="https://flaticon.com" alt="World Cup Trophy" class="w-16 h-16 rotating-trophy object-contain">
                </div>
                <span class="text-xs font-semibold theme-accent">Global Edition active</span>
            </div>
        </div>

        <!-- Main Book Module Container -->
        <div class="lg:col-span-2 space-y-4">
            
            <!-- Book Framework -->
            <div class="theme-panel border-4 rounded-2xl overflow-hidden relative shadow-2xl transition-all duration-300">
                
                <!-- Audio Controls Strip -->
                <div class="bg-black/40 backdrop-blur-sm p-3 border-b theme-border flex justify-between items-center px-4">
                    <span class="text-xs text-zinc-300 tracking-wider flex items-center space-x-2">
                        <i class="fa-solid fa-music text-emerald-400 animate-pulse"></i>
                        <span>Chapter Background Score Playing</span>
                    </span>
                    <button onclick="toggleAudio()" id="btn-audio" class="bg-red-600 hover:bg-red-500 text-white text-xs px-3 py-1.5 font-bold rounded flex items-center space-x-1 transition">
                        <i class="fa-solid fa-volume-xmark"></i> <span>Stop Music</span>
