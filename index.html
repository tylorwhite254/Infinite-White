<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Codex of Realms</title>

    <!-- SUPABASE SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    
    <style>
        /* ============================================================
           ROOT VARIABLES & THEMES
           ============================================================ */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141e;
            --bg-card: #1a1a2e;
            --text-primary: #e8e0d0;
            --text-secondary: #b8b0a0;
            --accent-gold: #c9a959;
            --accent-glow: rgba(201, 169, 89, 0.3);
            --border-color: #2a2a4a;
            --page-bg: #1a1208;
            --page-text: #f5e6c8;
            --page-border: #5a3f1f;
            --shadow-color: rgba(0, 0, 0, 0.6);
            --font-heading: 'Cinzel', serif;
            --font-body: 'Cormorant Garamond', serif;
            --transition-speed: 0.4s;
        }

        /* Themes */
        [data-theme="gold"] {
            --bg-primary: #1a1208;
            --bg-secondary: #2a1f0f;
            --bg-card: #3a2a15;
            --text-primary: #f5e6c8;
            --text-secondary: #d4c4a0;
            --accent-gold: #d4af37;
            --border-color: #c9a959;
            --page-bg: #2a1f0f;
            --page-text: #f5e6c8;
            --page-border: #d4af37;
        }

        [data-theme="neon"] {
            --bg-primary: #0a0a1a;
            --bg-secondary: #0a1a1a;
            --bg-card: #0d1f1f;
            --text-primary: #00ffcc;
            --text-secondary: #66ffdd;
            --accent-gold: #ff00ff;
            --border-color: #00ff88;
            --page-bg: #0a1a1a;
            --page-text: #00ffcc;
            --page-border: #ff00ff;
        }

        [data-theme="hacker"] {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-card: #0f0f0f;
            --text-primary: #00ff41;
            --text-secondary: #88ff88;
            --accent-gold: #00ff41;
            --border-color: #00ff41;
            --page-bg: #0a0a0a;
            --page-text: #00ff41;
            --page-border: #00ff41;
            --font-body: 'Courier New', monospace;
            --font-heading: 'Courier New', monospace;
        }

        /* ============================================================
           RESET & GLOBAL
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            transition: all var(--transition-speed) ease;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: 10px;
        }

        /* ============================================================
           LOGIN PAGE
           ============================================================ */
        #loginPage {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-primary);
            padding: 20px;
            background-image: radial-gradient(ellipse at 30% 20%, rgba(201, 169, 89, 0.05) 0%, transparent 70%);
        }

        .login-container {
            background: var(--bg-card);
            border: 2px solid var(--accent-gold);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px var(--shadow-color);
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--accent-gold), transparent, var(--accent-gold), transparent);
            background-size: 400% 400%;
            animation: borderGlow 6s ease infinite;
            border-radius: 32px;
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes borderGlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .login-container h1 {
            font-family: var(--font-heading);
            font-size: 2.8rem;
            color: var(--accent-gold);
            margin-bottom: 5px;
            letter-spacing: 4px;
            text-shadow: 0 0 30px var(--accent-glow);
        }

        .login-container .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 30px;
            font-style: italic;
            letter-spacing: 2px;
        }

        .profile-pic-upload {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--bg-primary);
            margin: 0 auto 25px;
            overflow: hidden;
            border: 4px solid var(--accent-gold);
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .profile-pic-upload:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px var(--accent-glow);
        }

        .profile-pic-upload img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-pic-upload .placeholder {
            color: var(--text-secondary);
            font-size: 40px;
            opacity: 0.5;
            font-family: var(--font-heading);
        }

        .profile-pic-upload input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .login-input {
            width: 100%;
            padding: 14px 20px;
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
            font-family: var(--font-body);
        }

        .login-input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-gold);
            color: var(--bg-primary);
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: var(--font-heading);
            letter-spacing: 2px;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .login-error {
            color: #ff4444;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .login-loading {
            display: none;
            margin-top: 10px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top: 2px solid var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ============================================================
           BOOK PAGE
           ============================================================ */
        #bookPage {
            display: none;
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--accent-gold);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            object-fit: cover;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .username-display {
            font-weight: bold;
            color: var(--accent-gold);
            font-family: var(--font-heading);
            letter-spacing: 1px;
        }

        .sync-status {
            font-size: 0.7rem;
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .sync-status .online {
            color: #4CAF50;
        }
        .sync-status .offline {
            color: #ff4444;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .top-actions button {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 10px;
            transition: 0.3s;
            font-family: var(--font-body);
        }

        .top-actions button:hover {
            background: var(--border-color);
            color: var(--accent-gold);
        }

        /* Settings Dropdown */
        .settings-dropdown {
            position: relative;
            display: inline-block;
        }

        .settings-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            background: var(--bg-card);
            border: 2px solid var(--accent-gold);
            border-radius: 15px;
            min-width: 220px;
            padding: 10px 0;
            box-shadow: 0 10px 40px var(--shadow-color);
            z-index: 200;
            backdrop-filter: blur(10px);
        }

        .settings-menu.open {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .settings-menu .menu-label {
            padding: 8px 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            opacity: 0.5;
            letter-spacing: 2px;
        }

        .settings-menu button {
            display: block;
            width: 100%;
            padding: 10px 20px;
            background: none;
            border: none;
            color: var(--text-primary);
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.95rem;
            font-family: var(--font-body);
        }

        .settings-menu button:hover {
            background: var(--border-color);
            color: var(--accent-gold);
        }

        .settings-menu .theme-option {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-menu .theme-option .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid var(--border-color);
        }

        .settings-menu hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 8px 15px;
            opacity: 0.3;
        }

        .settings-menu .delete-account-btn {
            color: #ff4444;
        }

        .settings-menu .delete-account-btn:hover {
            background: rgba(255, 68, 68, 0.1);
        }

        /* ============================================================
           BOOK CONTAINER
           ============================================================ */
        .book-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
            position: relative;
        }

        /* Quote Bar */
        .quote-bar {
            text-align: center;
            padding: 15px 20px;
            background: var(--bg-card);
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 4px solid var(--accent-gold);
            border-right: 4px solid var(--accent-gold);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            box-shadow: 0 4px 20px var(--shadow-color);
            font-family: var(--font-body);
        }

        .quote-bar .quote-text {
            color: var(--text-secondary);
            font-style: italic;
            font-size: 1.1rem;
        }

        .quote-bar .quote-author {
            color: var(--accent-gold);
            font-weight: bold;
            font-size: 1rem;
        }

        /* Book Page */
        .book-page {
            background: var(--page-bg);
            border: 3px solid var(--page-border);
            border-radius: 25px;
            padding: 45px 50px;
            min-height: 450px;
            position: relative;
            box-shadow: 0 10px 50px var(--shadow-color);
            transition: all var(--transition-speed) ease;
        }

        .book-page::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid var(--page-border);
            border-radius: 18px;
            opacity: 0.3;
            pointer-events: none;
        }

        .book-page .page-title {
            font-family: var(--font-heading);
            color: var(--accent-gold);
            font-size: 2.2rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--page-border);
            padding-bottom: 15px;
            text-shadow: 0 0 30px var(--accent-glow);
        }

        .book-page .page-content {
            color: var(--page-text);
            line-height: 1.9;
            font-size: 1.1rem;
        }

        .book-page .page-content img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin: 20px 0;
            opacity: 0.7;
            transition: 0.4s;
            display: block;
            box-shadow: 0 4px 20px var(--shadow-color);
        }

        .book-page .page-content img:hover {
            opacity: 1;
            transform: scale(1.01);
        }

        .book-page .page-content p {
            margin-bottom: 15px;
        }

        /* Reactions */
        .reaction-bar {
            display: flex;
            gap: 25px;
            align-items: center;
            margin: 25px 0 20px;
            padding-top: 20px;
            border-top: 1px solid var(--page-border);
        }

        .reaction-bar button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px 18px;
            border-radius: 20px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-body);
        }

        .reaction-bar button:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .reaction-bar .liked {
            color: #4CAF50;
        }

        .reaction-bar .disliked {
            color: #ff4444;
        }

        /* Comments */
        .comments-section {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px solid var(--page-border);
        }

        .comments-section h4 {
            color: var(--accent-gold);
            font-family: var(--font-heading);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .comment-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .comment-box input {
            flex: 1;
            padding: 12px 18px;
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            outline: none;
            font-family: var(--font-body);
            font-size: 1rem;
        }

        .comment-box input:focus {
            border-color: var(--accent-gold);
        }

        .comment-box button {
            padding: 12px 24px;
            background: var(--accent-gold);
            color: var(--bg-primary);
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: var(--font-heading);
            letter-spacing: 1px;
        }

        .comment-box button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .comment-item {
            background: var(--bg-primary);
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent-gold);
        }

        .comment-item .comment-user {
            color: var(--accent-gold);
            font-weight: bold;
            font-family: var(--font-heading);
        }

        .comment-item .comment-time {
            opacity: 0.4;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        .comment-item .comment-text {
            margin-top: 5px;
            color: var(--text-secondary);
        }

        /* Page Navigation */
        .page-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            gap: 15px;
        }

        .page-nav button {
            padding: 14px 35px;
            background: var(--accent-gold);
            color: var(--bg-primary);
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-heading);
            letter-spacing: 1px;
        }

        .page-nav button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .page-nav button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .page-indicator {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-family: var(--font-heading);
            letter-spacing: 1px;
        }

        /* Social Media Buttons */
        .social-cover {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .social-cover a {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 2px solid var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            font-size: 24px;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-cover a:hover {
            background: var(--accent-gold);
            color: var(--bg-primary);
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        /* Audio Control */
        .audio-control {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            border: 2px solid var(--accent-gold);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 50;
            transition: 0.3s;
            box-shadow: 0 5px 30px var(--shadow-color);
        }

        .audio-control:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px var(--accent-glow);
        }

        .audio-control i {
            font-size: 26px;
            color: var(--accent-gold);
        }

        /* Trophy */
        .trophy {
            position: fixed;
            bottom: 30px;
            left: 30px;
            font-size: 40px;
            animation: spinTrophy 8s linear infinite;
            z-index: 50;
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }

        @keyframes spinTrophy {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Chat Modal */
        .chat-modal {
            display: none;
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 360px;
            height: 450px;
            background: var(--bg-card);
            border: 2px solid var(--accent-gold);
            border-radius: 20px;
            z-index: 300;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 50px var(--shadow-color);
        }

        .chat-modal.open {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-header {
            padding: 15px 20px;
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--accent-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header span {
            font-family: var(--font-heading);
            color: var(--accent-gold);
            letter-spacing: 1px;
        }

        .chat-header button {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .chat-header button:hover {
            color: var(--accent-gold);
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        .chat-message {
            margin-bottom: 10px;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: 12px;
            max-width: 85%;
            border-left: 2px solid var(--accent-gold);
        }

        .chat-message .sender {
            font-weight: bold;
            color: var(--accent-gold);
            font-size: 0.8rem;
            font-family: var(--font-heading);
        }

        .chat-message .msg {
            margin-top: 4px;
            color: var(--text-secondary);
        }

        .chat-message .time {
            font-size: 0.6rem;
            opacity: 0.3;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            gap: 8px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .chat-input input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            outline: none;
            font-family: var(--font-body);
        }

        .chat-input input:focus {
            border-color: var(--accent-gold);
        }

        .chat-input button {
            padding: 10px 18px;
            background: var(--accent-gold);
            color: var(--bg-primary);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: var(--font-heading);
        }

        .chat-input button:hover {
            transform: scale(1.05);
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 2px solid var(--accent-gold);
            border-radius: 25px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px var(--shadow-color);
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h3 {
            color: var(--accent-gold);
            font-family: var(--font-heading);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .modal-content textarea {
            width: 100%;
            height: 120px;
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 15px;
            resize: vertical;
            outline: none;
            font-family: var(--font-body);
            font-size: 1rem;
        }

        .modal-content textarea:focus {
            border-color: var(--accent-gold);
        }

        .modal-content .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            justify-content: flex-end;
        }

        .modal-content .btn-group button {
            padding: 10px 25px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: var(--font-heading);
            letter-spacing: 1px;
        }

        .modal-content .btn-cancel {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .modal-content .btn-submit {
            background: var(--accent-gold);
            color: var(--bg-primary);
        }

        .modal-content .btn-submit:hover {
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .delete-box h3 {
            color: #ff4444;
        }

        .delete-box .btn-danger {
            background: #ff4444;
            color: white;
        }

        .delete-box .btn-danger:hover {
            background: #cc0000;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            .login-container {
                padding: 35px 25px;
            }
            .login-container h1 {
                font-size: 2rem;
            }
            .book-page {
                padding: 25px 20px;
            }
            .book-page .page-title {
                font-size: 1.6rem;
            }
            .top-bar {
                flex-wrap: wrap;
                gap: 10px;
                padding: 10px 15px;
            }
            .top-actions {
                flex-wrap: wrap;
            }
            .page-nav {
                flex-wrap: wrap;
                justify-content: center;
            }
            .page-nav button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
            .chat-modal {
                width: 95%;
                right: 2.5%;
                height: 400px;
            }
            .comment-box {
                flex-wrap: wrap;
            }
            .comment-box input {

            }
            .audio-control {
                width: 50px;
                height: 50px;
                bottom: 15px;
                right: 15px;
            }
            .trophy {
                font-size: 30px;
                bottom: 15px;
                left: 15px;
            }
            .quote-bar {
                font-size: 0.9rem;
                padding: 12px 15px;
            }
            .social-cover a {

                height: 45px;
                font-size: 20px;
            }
        }

        @media (max-width: 480px) {
            .book-page {

            }
            .book-page .page-title {
                font-size: 1.3rem;
            }
            .reaction-bar {
                flex-wrap: wrap;
                gap: 10px;
            }
        }
