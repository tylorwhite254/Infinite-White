<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Codex of Realms - Multi-View Platform</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* CSS RESET & VARIABLES */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(20, 27, 45, 0.85);
            --text-color: #e2e8f0;
            --accent-glow: #00f2fe;
            --accent-secondary: #4facfe;
            --book-page: #f4ecd8;
            --book-text: #2c2519;
            --border-glow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        /* LIVE VIEWS SWITCHER BAR */
        #view-switcher {
            position: fixed; top: 0; left: 0; width: 100%; height: 45px;
            background: #000; border-bottom: 2px solid #00f2fe; z-index: 99999;
            display: flex; justify-content: center; align-items: center; gap: 20px;
        }
        .view-btn {
            background: #111; color: #fff; border: 1px solid #333; padding: 5px 15px;
            cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.3s;
        }
        .view-btn.active {
            background: #00f2fe; color: #000; box-shadow: 0 0 10px #00f2fe; border-color: #00f2fe;
        }

        /* MAIN APP CONTAINERS */
        body { background: #05070c; min-height: 100vh; overflow-x: hidden; padding-top: 45px;}
        .app-view { display: none; width: 100%; min-height: calc(100vh - 45px); }
        .app-view.active-view { display: block; }

        /* MULTI-THEME ARCHITECTURE */
        body.theme-dark {
            --bg-color: #0d1117; --panel-bg: #161b22; --text-color: #c9d1d9;
            --accent-glow: #58a6ff; --accent-secondary: #1f6feb; --border-glow: 0 0 15px rgba(88,166,255,0.4);
        }
        body.theme-gold {
            --bg-color: #1a1510; --panel-bg: #2d2219; --text-color: #f1e4d3;
            --accent-glow: #ffdf00; --accent-secondary: #d4af37; --border-glow: 0 0 15px rgba(255,223,0,0.4);
        }
        body.theme-neon {
            --bg-color: #0b0f19; --panel-bg: rgba(20, 27, 45, 0.85); --text-color: #e2e8f0;
            --accent-glow: #00f2fe; --accent-secondary: #4facfe; --border-glow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        body.theme-green {
            --bg-color: #050c05; --panel-bg: #0d1f0d; --text-color: #00ff00;
            --accent-glow: #39ff14; --accent-secondary: #00aa00; --border-glow: 0 0 15px rgba(57,255,20,0.5);
        }

        /* PLATFORM SCREEN FRAME (TABLET STYLE ASPECT RATIO FROM IMAGE) */
        .tablet-frame {
            max-width: 1280px; margin: 20px auto; padding: 25px;
            background: var(--panel-bg); border-radius: 24px;
            box-shadow: var(--border-glow); border: 1px solid rgba(255,255,255,0.1);
            position: relative; backdrop-filter: blur(10px);
        }

        /* HEADER ELEMENTS */
        .platform-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-badge { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 55px; height: 55px; border-radius: 50%; border: 3px solid var(--accent-glow); object-fit: cover; }
        .user-info .username { color: var(--text-color); font-weight: bold; font-size: 1.1rem; }
        .user-info .status { color: var(--accent-glow); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;}
        .platform-title { color: var(--text-color); text-shadow: var(--border-glow); font-size: 1.8rem; font-family: 'Georgia', serif; font-weight: bold;}

        /* DROPDOWN NAVIGATION SETTINGS Menu */
        .dropdown-menu-container { position: relative; display: inline-block; }
        .dropdown-trigger-btn { 
            background: #111625; color: var(--text-color); border: 1px solid var(--accent-glow); 
            padding: 10px 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600;
        }
        .dropdown-content-pane {
            display: none; position: absolute; left: 0; top: 110%; background: #111625; min-width: 240px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.5); border-radius: 8px; border: 1px solid var(--accent-glow); z-index: 100; overflow: hidden;
        }
        .dropdown-content-pane.active-pane { display: block; }
        .dropdown-item { 
            padding: 12px 16px; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; text-decoration: none;
        }
        .dropdown-item:hover { background: rgba(255,255,255,0.08); color: var(--accent-glow); }
        .dropdown-item i { width: 20px; text-align: center; }

        /* THE BOOK DESIGN AND STRUCTURE */
        .book-wrapper-container {
            display: flex; background: var(--book-page); border-radius: 12px; box-shadow: inset 0 0 40px rgba(0,0,0,0.2), 0 10px 25px rgba(0,0,0,0.5);
            min-height: 480px; position: relative; margin-bottom: 25px; overflow: hidden; border: 10px solid #2c1e11;
        }
        .book-page-half { width: 50%; padding: 35px; position: relative; display: flex; flex-direction: column; justify-content: flex-start; }
        .book-page-half:first-child { border-right: 2px solid rgba(0,0,0,0.15); box-shadow: inset -15px 0 20px rgba(0,0,0,0.1); }
        .book-page-half:last-child { box-shadow: inset 15px 0 20px rgba(0,0,0,0.1); }
        .book-text-content { color: var(--book-text); font-size: 1.05rem; line-height: 1.6; font-family: 'Georgia', serif; text-align: justify; z-index: 2; position: relative; pointer-events: none;}
        
        /* TRANSLUCENT OVERLAY WATERMARK IMAGES */
        .translucent-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75%; height: auto; opacity: 0.12; pointer-events: none; z-index: 1; filter: grayscale(30%);
        }

        /* ANIME QUOTE BORDERS CONTAINER */
        .quote-ticker-banner {
            background: rgba(0,0,0,0.4); border: 1px dashed var(--accent-secondary); padding: 8px 15px;
            border-radius: 6px; text-align: center; margin: 15px 0; color: var(--accent-glow); font-style: italic; font-size: 0.95rem;
        }

        /* FOOTER ACTIONS AND SCOREBOARDS */
        .bottom-interaction-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-top: 20px; }
        .trophy-container { display: flex; flex-direction: column; align-items: center; width: 100px; }
        .rotating-trophy { width: 65px; height: auto; animation: spinTrophy 12s linear infinite; filter: drop-shadow(0 0 8px #ffd700); }
        @keyframes spinTrophy { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        /* LIKE DISLIKE BUTTONS MODULE */
        .voting-system-box { display: flex; gap: 15px; }
        .vote-action-btn {
            background: #121824; border: 1px solid rgba(255,255,255,0.1); color: var(--text-color);
            padding: 12px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .vote-action-btn:hover { background: var(--accent-secondary); color: #000; box-shadow: var(--border-glow); }

        /* COMMENTS WRAPPER ARCHITECTURE */
        .comments-section-container { flex-grow: 1; max-width: 500px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .comment-input-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .comment-box-field { flex-grow: 1; background: #090d16; border: 1px solid var(--accent-glow); border-radius: 4px; padding: 8px; color: #fff; }
        .comment-post-btn { background: var(--accent-glow); border: none; padding: 0 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .comments-output-list { max-height: 110px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .comment-node { font-size: 0.85rem; padding: 6px; border-left: 2px solid var(--accent-glow); background: rgba(255,255,255,0.03); color: var(--text-color); }

        /* NAVIGATION INTERFACE MANAGEMENT */
        .navigation-controls-cluster { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .media-toggle-btn { background: #ea4335; border: none; color: white; padding: 8px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; }
        .page-navigation-btn {
            background: #22c55e; border: none; color: white; padding: 15px 30px; border-radius: 8px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 14px rgba(34,197,94,0.4);
        }
        .page-navigation-btn:hover { background: #16a34a; transform: translateY(-1px); }

        /* INTERACTIVE GATEWAY LOGIN FRAME */
        .auth-overlay-gateway {
            position: fixed; top: 45px; left: 0; width: 100%; height: calc(100vh - 45px);
            background: #060913; display: flex; justify-content: center; align-items: center; z-index: 5000;
        }
        .auth-card-panel {
            background: #111726; border: 2px solid var(--accent-glow); padding: 40px; border-radius: 16px;
            width: 100%; max-width: 420px; box-shadow: var(--border-glow); text-align: center;
        }
        .auth-title { color: #fff; margin-bottom: 25px; font-size: 1.6rem; }
        .auth-form-group { margin-bottom: 20px; text-align: left; }
        .auth-form-group label { display: block; color: var(--text-color); margin-bottom: 6px; font-size: 0.9rem; }
